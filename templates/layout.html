<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Gestion Bar{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/globale.css') }}">
</head>
<body>

<footer class="mt-auto py-3 bg-white border-top">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="text-muted" style="font-size: 0.7rem; letter-spacing: 0.05em;">
            &copy; 2026 <span class="fw-bold text-dark">HASINIAINA DEV</span> — SYSTÈME DE GESTION POS
        </div>
        <div id="status-indicator" class="small d-flex align-items-center text-success" style="font-size: 0.7rem;">
            <span class="me-2">●</span> EN SERVICE
        </div>
    </div>
</footer>

<header class="app-header fixed-top shadow-sm border-bottom">
    <div class="container d-flex justify-content-between align-items-center py-3">
        <a href="/" class="d-flex align-items-center text-decoration-none">
            <div class="logo-circle me-2">B</div>
            <span class="brand-text">
                Bar<span class="text-secondary">Manager</span>
            </span>
        </a>

        <nav class="d-flex gap-4">
            <a href="/" class="nav-link-custom">Tables</a>
            <a href="/stock" class="nav-link-custom">Stock</a>
            <a href="/total-income/produits/" class="nav-link-custom">Revenus</a>
        </nav>
    </div>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
